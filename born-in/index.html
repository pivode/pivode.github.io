<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The World When You Were Born</title>
  <meta name="description" content="Discover what the world looked like the year you were born. Population, prices, leaders, culture, and more.">
  <meta property="og:title" content="The World When You Were Born">
  <meta property="og:description" content="Discover what the world looked like the year you were born.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://pivode.github.io/born-in">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="The World When You Were Born">
  <meta name="twitter:description" content="Discover what the world looked like the year you were born.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SCREEN 1: LANDING -->
  <section id="landing" class="screen-landing">
    <div class="landing-inner">
      <div class="typewriter-wrap">
        <p id="typewriter" class="typewriter"></p>
      </div>
      <form id="input-form" class="input-row" novalidate>
        <div class="input-group">
          <label for="year-input" class="input-label">Birth Year</label>
          <input
            id="year-input"
            type="number"
            class="year-input"
            placeholder="1987"
            min="1950"
            max="2010"
            autocomplete="off"
          >
          <span id="year-error" class="input-error" role="alert"></span>
        </div>
        <div class="input-group">
          <label for="country-btn" class="input-label">Country</label>
          <div class="country-select-wrap">
            <button type="button" id="country-btn" class="country-btn" aria-haspopup="listbox" aria-expanded="false">
              <span id="country-display">
                <span class="flag">🇺🇸</span>
                <span class="country-name">United States</span>
              </span>
              <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div id="country-dropdown" class="country-dropdown" role="listbox" aria-label="Select country">
              <div class="country-search-wrap">
                <input type="text" id="country-search" class="country-search" placeholder="Search..." autocomplete="off">
              </div>
              <ul id="country-list" class="country-list"></ul>
            </div>
          </div>
        </div>
        <button type="submit" id="submit-btn" class="submit-btn" aria-label="Explore">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </div>
  </section>

  <!-- REVEAL ANIMATION OVERLAY -->
  <div id="reveal-overlay" class="reveal-overlay" aria-hidden="true">
    <div id="reveal-year" class="reveal-year"></div>
    <div id="reveal-sub" class="reveal-sub"></div>
  </div>

  <!-- SCREEN 2: INFOGRAPHIC -->
  <section id="infographic" class="screen-infographic hidden">

    <!-- STICKY HEADER -->
    <header id="info-header" class="info-header">
      <div class="header-left">
        <span id="header-year" class="header-year"></span>
        <span class="header-sep">·</span>
        <span id="header-country" class="header-country"></span>
      </div>
      <div class="header-right">
        <button id="share-btn" class="header-btn" aria-label="Share">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M10 2.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zm-7.5 5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM10 10a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3.5 7.5L10 4M3.5 7.5L10 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <span>Share</span>
        </button>
        <button id="new-year-btn" class="header-btn" aria-label="Try another year">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M7.5 1.5L3 6h3v5h3V6h3L7.5 1.5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>New year</span>
        </button>
      </div>
    </header>

    <!-- SHARE POPOVER -->
    <div id="share-popover" class="share-popover hidden" role="dialog" aria-label="Share options">
      <button id="copy-link-btn" class="share-option">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Copy link
      </button>
      <button id="tweet-btn" class="share-option">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M12.6 1h2.4l-5.2 5.9L16 15h-4.8l-3.7-4.9L3 15H.6l5.5-6.3L0 1h4.9l3.4 4.4L12.6 1zm-.8 12.6h1.3L4.3 2.3H2.9l8.9 11.3z"/>
        </svg>
        Share on X
      </button>
    </div>

    <!-- INFOGRAPHIC CONTENT -->
    <div id="info-content" class="info-content"></div>

    <!-- DATA NERD CTA -->
    <div class="data-cta" id="data-cta">
      <p class="data-cta-eyebrow">data nerd?</p>
      <p class="data-cta-headline">We build the datasets behind stuff like this.</p>
      <p class="data-cta-sub">Cleaned CSVs on roller coasters, Michelin stars, football, and more.</p>
      <a href="https://pivode.github.io" class="data-cta-btn" target="_blank" rel="noopener">Browse datasets →</a>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-inner">
        <p class="footer-brand">pivode</p>
        <p class="footer-copy">Data compiled and maintained by Pivode.</p>
      </div>
    </footer>

  </section>

  <!-- ERROR STATE -->
  <div id="data-error" class="data-error hidden" role="alert">
    <p id="error-message" class="error-message"></p>
    <button id="error-back-btn" class="error-back-btn">← Try another year</button>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
