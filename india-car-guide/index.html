<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>India Car Buying Guide - Straight Answers | Pivode</title>
  <meta name="description" content="No fluff, no specs. Straight answers to India's most argued car buying questions - petrol vs diesel, Nexon vs Brezza, AMT vs CVT, new vs used, and more.">
  <meta property="og:title" content="India Car Buying Guide - Straight Answers">
  <meta property="og:description" content="The honest guide to buying a car in India. Context-aware verdicts, not generic advice.">
  <meta property="og:url" content="https://pivode.github.io/india-car-guide">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script data-goatcounter="https://pivode.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <nav class="site-nav">
    <a href="/" class="nav-logo">piv<span>ode</span></a>
    <a href="/born-in" class="nav-link">Born in... ✦</a>
  </nav>

  <!-- HOME SCREEN -->
  <div id="screen-home">
    <header class="hero">
      <p class="hero-eyebrow">India Car Buying Guide</p>
      <h1 class="hero-headline">Real answers to<br>India's toughest<br>car questions.</h1>
      <p class="hero-sub">Pick what you're trying to figure out. Answer a few questions. Get a verdict with the reasoning behind it.</p>
    </header>

    <div class="container">
      <div id="module-grid" class="module-grid"></div>

      <div class="home-footer">
        <p>Data nerds: our <a href="https://seangularity.gumroad.com/l/indian-cars" target="_blank" rel="noopener">Indian Cars dataset</a> covers 1,968 variants across 285 models.</p>
      </div>
    </div>
  </div>

  <!-- SHARED QUIZ/VERDICT HEADER (hidden on home) -->
  <div id="quiz-chrome" class="hidden">
    <div class="quiz-header">
      <button id="btn-back" class="btn-back">← Back</button>
      <span class="quiz-module-name" id="quiz-module-title"></span>
      <span class="quiz-step" id="quiz-step"></span>
    </div>
    <div class="quiz-progress">
      <div class="quiz-progress-bar" id="quiz-progress-bar"></div>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="hidden">
    <div class="container">
      <div id="quiz-question-wrap" class="quiz-question-wrap">
        <h2 id="quiz-question-text" class="quiz-question"></h2>
        <div id="quiz-options" class="quiz-options"></div>
      </div>
    </div>
  </div>

  <!-- VERDICT SCREEN -->
  <div id="screen-verdict" class="hidden">
    <div class="container">
      <div id="verdict-container" class="verdict-container"></div>
    </div>

  <script src="app.js" defer></script>
